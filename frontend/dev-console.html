<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Agent Console | Deal Desk</title>
    <link rel="stylesheet" href="dealdesk-ui-lock.css">
    <style>
        :root {
            --primary-bg: #f8fafc;
            --sidebar-bg: #1e293b;
            --chat-bg: #ffffff;
            --accent-color: #0f766e;
            --text-main: #334155;
            --text-dim: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            color: white;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--accent-color);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.agent {
            align-self: flex-start;
            background-color: #f1f5f9;
            color: var(--text-main);
            border-bottom-left-radius: 2px;
            white-space: pre-wrap;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            background: #f8fafc;
        }

        input[type="text"], textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .config-item label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
        }

        .config-item input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
        }

        .tool-call {
            font-family: monospace;
            font-size: 12px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin-top: 8px;
            overflow: hidden;
        }

        .tool-call-header {
            background: #f1f5f9;
            padding: 6px 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .tool-call-body {
            padding: 10px;
            display: none;
            border-top: 1px solid #e2e8f0;
            background: #fafafa;
            max-height: 200px;
            overflow-y: auto;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="margin: 0; color: #f1f5f9; font-size: 20px;">Dev Console</h2>
        <div class="dashboard-eyebrow">READ-ONLY BRIDGE V1</div>
        
        <div class="config-item">
            <label>Dev Agent Token</label>
            <input type="password" id="token" placeholder="Enter token from .env">
        </div>

        <div style="margin-top: auto; font-size: 12px; color: #94a3b8;">
            Connected to: <span id="status" style="color: #4ade80;">Online</span>
        </div>
    </div>

    <div class="main-content">
        <div class="dashboard-hero" style="padding: 20px; margin-bottom: 0;">
            <h1 class="dashboard-title" style="font-size: 24px;">Dev Agent Bridge</h1>
            <p class="dashboard-lead" style="font-size: 14px;">Interrogate live application state securely through AI-driven read-only tools.</p>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="message agent">Hello! I am your Dev Agent. How can I help you investigate the application state today?</div>
            </div>
            <div class="chat-input-area">
                <textarea id="prompt" rows="1" placeholder="Ask a development question... (e.g., 'What is the schema for dd_deals?')" onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }"></textarea>
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const promptInput = document.getElementById('prompt');
        const tokenInput = document.getElementById('token');
        const sendBtn = document.getElementById('send-btn');

        let history = [];

        async function sendMessage() {
            const prompt = promptInput.value.trim();
            const token = tokenInput.value.trim();

            if (!prompt) return;
            if (!token) {
                alert('Please enter your Dev Agent Token from the .env file.');
                return;
            }

            // Append User Message
            appendMessage('user', prompt);
            promptInput.value = '';
            setLoading(true);

            try {
                const response = await fetch('/api/dev-agent/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-dev-agent-token': token
                    },
                    body: JSON.stringify({ prompt, history })
                });

                const data = await response.json();

                if (data.ok) {
                    appendMessage('agent', data.answer);
                    // Add to history for context (simplified)
                    history.push({ role: 'user', content: prompt });
                    history.push({ role: 'assistant', content: data.answer });
                    if (history.length > 10) history = history.slice(-10);
                } else {
                    appendMessage('agent', 'Error: ' + (data.error || 'Unknown error occurred.'));
                }
            } catch (err) {
                appendMessage('agent', 'Network Error: ' + err.message);
            } finally {
                setLoading(false);
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            promptInput.disabled = isLoading;
            if (isLoading) {
                sendBtn.textContent = '...ing';
            } else {
                sendBtn.textContent = 'Send';
                promptInput.focus();
            }
        }

        // Auto-expand textarea
        promptInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Initialize from localStorage if token exists
        if (localStorage.getItem('dd_dev_token')) {
            tokenInput.value = localStorage.getItem('dd_dev_token');
        }
        tokenInput.addEventListener('change', () => {
            localStorage.setItem('dd_dev_token', tokenInput.value);
        });
    </script>
</body>
</html>
